name: Documentation issue
description: Report a public-safe documentation problem without secrets or protected internals.
title: "[Docs]: "
labels:
  - "type: documentation"
  - "area: public-preview"
  - "status: needs-triage"
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Do not include secrets, customer data, exploit details, or protected implementation assumptions.
    validations:
      required: true
